<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Configuração base da página -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <!-- CSS exclusivo da tela de registro -->
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <!-- Container central do cadastro -->
  <main class="pagina">
    <section class="cartao">
      <h1>Criar cadastro</h1>

      <!-- Formulário com os dados do novo usuário -->
      <form id="formularioRegistro">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>

        <label for="idade">Idade</label>
        <input type="number" id="idade" min="0" max="120" required>

        <label for="sexo">Sexo</label>
        <select id="sexo" required>
          <option value="">Selecione</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Outro">Outro</option>
          <option value="Prefiro não informar">Prefiro não informar</option>
        </select>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" maxlength="15" placeholder="(00) 00000-0000">

        <label for="email">Gmail</label>
        <input type="email" id="email" placeholder="seuemail@gmail.com">

        <label for="senhaRegistro">Senha</label>
        <input type="password" id="senhaRegistro" minlength="6" required>

        <button type="submit">Cadastrar</button>
      </form>

      <!-- Área de mensagens de validação -->
      <p id="mensagemRegistro" class="mensagem"></p>
      <!-- Link de retorno para login -->
      <a class="voltar" href="../login/login.html">Voltar para login</a>
    </section>
  </main>

  <!-- Script com lógica de cadastro -->
  <script src="registro.js"></script>
</body>
</html>
